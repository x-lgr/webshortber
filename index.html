<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Contact</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    position:relative;
    padding:15px;
}

/* Background */

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:url("https://raw.githubusercontent.com/x-lgr/pom2/main/ChatGPT%20Image%20Jun%206%2C%202026%2C%2011_25_05%20AM.png") center center/cover no-repeat;
    z-index:-2;
}

body::after{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.22);
    z-index:-1;
}

/* Glass Card */

.card{

    width:100%;
    max-width:430px;
    max-height:95vh;

    overflow-y:auto;
    overflow-x:hidden;

    padding:26px;

    border-radius:28px;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);

    border:1px solid rgba(255,255,255,.18);

    box-shadow:
    0 15px 45px rgba(0,0,0,.45),
    inset 0 1px 0 rgba(255,255,255,.12);

    color:#fff;
}

/* Hide Scrollbar */

.card::-webkit-scrollbar{
    width:0;
}

.card{
    scrollbar-width:none;
}

/* Logo */

.logo{

    width:80px;
    height:80px;

    margin:auto;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:38px;

    background:rgba(255,255,255,.08);

    border:1px solid rgba(255,255,255,.15);

    margin-bottom:18px;

}

h1{

    text-align:center;

    font-size:27px;

    margin-bottom:10px;

}

.desc{

    text-align:center;

    color:#ececec;

    line-height:1.7;

    font-size:14px;

    margin-bottom:20px;

}

.box{

    background:rgba(255,255,255,.05);

    border:1px solid rgba(255,255,255,.10);

    border-radius:18px;

    padding:18px;

}

.label{

    text-align:center;

    color:#ccc;

    font-size:13px;

}

.number{

    text-align:center;

    font-size:30px;

    font-weight:700;

    margin:12px 0 18px;

}

.open-btn{

    display:block;

    width:100%;

    text-align:center;

    text-decoration:none;

    padding:15px;

    border-radius:14px;

    background:linear-gradient(135deg,#7c3aed,#2563eb);

    color:#fff;

    font-weight:600;

    margin-bottom:12px;

    transition:.25s;

}

.open-btn:hover{

    transform:translateY(-2px);

}

button{

    width:100%;

    padding:15px;

    border:none;

    border-radius:14px;

    background:#25D366;

    color:#fff;

    font-size:15px;

    font-weight:600;

    cursor:pointer;

    transition:.25s;

}

button:hover{

    transform:translateY(-2px);

}

/* Instructions */

.instructions{

    margin-top:18px;

    background:rgba(255,255,255,.05);

    border:1px solid rgba(255,255,255,.08);

    border-radius:18px;

    padding:16px;

}

.instructions h3{

    margin-bottom:10px;

    font-size:17px;

}

.instructions ul{

    list-style:none;

    color:#ededed;

    line-height:1.8;

    font-size:14px;

}

.instructions li::before{

    content:"✔ ";

    color:#25D366;

}

/* Telegram */

.telegram{

    display:block;

    text-decoration:none;

    text-align:center;

    margin-top:18px;

    padding:15px;

    border-radius:14px;

    background:#229ED9;

    color:#fff;

    font-weight:600;

    transition:.25s;

}

.telegram:hover{

    transform:translateY(-2px);

}

.footer{

    text-align:center;

    margin-top:18px;

    color:#ddd;

    font-size:13px;

}

.toast{

    position:fixed;

    left:50%;

    bottom:20px;

    transform:translateX(-50%);

    background:#25D366;

    color:#fff;

    padding:12px 20px;

    border-radius:30px;

    font-weight:600;

    opacity:0;

    transition:.35s;

    z-index:100;

}

.toast.show{

    opacity:1;

}

@media(max-width:420px){

.card{

padding:22px;

max-height:96vh;

}

.number{

font-size:25px;

}

h1{

font-size:24px;

}

}
</style>

</head>

<body>

<div class="card">

<div class="logo">💬</div>

<h1>Contact on WhatsApp</h1>

<p class="desc">
If WhatsApp doesn't open from the ad, use the options below.
</p>

<div class="box">

<div class="label">
WhatsApp Number
</div>

<div class="number" id="number">
8441043507
</div>

<a href="https://pompom.xo.je" target="_blank" class="open-btn">
🎬 Demo Videos
</a>

<button onclick="copyNumber()">
📋 Copy WhatsApp Number
</button>

</div>

<div class="instructions">

<h3>Quick Steps</h3>

<ul>
<li>Copy the number.</li>
<li>Open WhatsApp.</li>
<li>Paste &amp; send your message.</li>
</ul>

</div>

<a class="telegram" href="https://t.me/kingxlgr" target="_blank">
📨 Open Telegram Chat
</a>

<div class="footer">
We'll reply as soon as possible ❤️
</div>

</div>

<div class="toast" id="toast">
Number Copied ✔
</div>

<script>

function copyNumber(){

navigator.clipboard.writeText("8441043507");

const toast=document.getElementById("toast");

toast.classList.add("show");

setTimeout(()=>{
toast.classList.remove("show");
},2000);

}

</script>

</body>
</html>
